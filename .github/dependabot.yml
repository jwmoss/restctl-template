version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /{{cookiecutter.project_slug}}/.github/workflows
    schedule:
      interval: weekly
    groups:
      generated-actions:
        patterns:
          - "*"
